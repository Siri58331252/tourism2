{% extends "base.html" %}

{% block content %}
<div class="min-h-screen relative flex items-center justify-center px-4
            bg-cover bg-center" style="background-image: url('/static/bg.jpg');">

    <div class="absolute inset-0 bg-black/30 "></div>

    <div class="relative z-10 max-w-md w-full bg-black/70 backdrop-blur-lg
                rounded-xl shadow-lg p-8">
        <h2 class="text-2xl font-bold text-white text-center mb-6">เข้าสู่ระบบ</h2>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-white mb-1">อีเมล (Email) *</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    placeholder="กรอกอีเมล">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-medium text-white">รหัสผ่าน (Password) *</label>
                    <a href="/forgot-password" class="text-xs text-yellow-500 hover:text-yellow-400 hover:underline transition">
                        ลืมรหัสผ่าน?
                    </a>
                </div>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    placeholder="กรอกรหัสผ่าน">
            </div>

            {% if error %}
            <p class="text-red-500 text-sm bg-red-50 p-2 rounded border border-red-200 text-center">
                {{ error }}
            </p>
            {% endif %}

            <button type="submit"
                class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-semibold py-2 rounded-md transition duration-200 mt-2">
                เข้าสู่ระบบ
            </button>
        </form>

        <div class="mt-6 text-center">
            <span class="text-sm text-white">ยังไม่มีบัญชี?</span>
            <a href="/register" class="text-sm text-yellow-600 hover:text-yellow-500 hover:underline ml-1 font-medium">สมัครสมาชิก</a>
        </div>
    </div>
</div>
{% endblock %}
