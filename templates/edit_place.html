{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-6 text-center">
        แก้ไขสถานที่ท่องเที่ยว
    </h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-5">

        <!-- ชื่อสถานที่ -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                ชื่อสถานที่
            </label>
            <input type="text" name="name" required value="{{ place.name }}"
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="เช่น น้ำตกเอราวัณ">
        </div>

        <!-- จังหวัด -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                จังหวัด
            </label>
            <select name="province_id" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">-- เลือกจังหวัด --</option>
                {% for p in provinces %}
                <option value="{{ p.id }}" {% if p.id==place.province_id %}selected{% endif %}>{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- หมวดหมู่ -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                หมวดหมู่
            </label>
            <select name="category_id" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">-- เลือกหมวดหมู่ --</option>
                {% for c in categories %}
                <option value="{{ c.id }}" {% if c.id==place.category_id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- รายละเอียด -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                รายละเอียด
            </label>
            <textarea name="description" rows="5" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="อธิบายรายละเอียดสถานที่ท่องเที่ยว">{{ place.description }}</textarea>
        </div>

        <!-- รูปภาพปัจจุบัน -->
        {% if place.image %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                รูปภาพปัจจุบัน
            </label>
            <div class="flex gap-2 flex-wrap">
                {% set images = place.image.split(',') %}
                {% for img in images %}
                <div class="relative">
                    <img src="{{ url_for('static', filename='uploads/' ~ img) }}" alt="place image"
                        class="w-24 h-20 object-cover rounded">
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <!-- ปุ่ม -->
        <div class="flex justify-between items-center mt-6">
            <a href="/admin/manage" class="text-gray-600 hover:underline">
                ← กลับไปยังหน้าจัดการสถานที่
            </a>

            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-semibold transition">
                บันทึกการแก้ไข
            </button>
        </div>

    </form>
</div>
{% endblock %}
