{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">

    <h1 class="text-2xl font-bold text-gray-800 mb-8">
        ✏️ แก้ไขข้อมูลสมาชิก
    </h1>

    <div class="bg-white rounded-lg shadow p-8">

        <form method="POST" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    ชื่อผู้ใช้
                </label>
                <input type="text" name="username" value="{{ user.username }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    อีเมล
                </label>
                <input type="email" name="email" value="{{ user.email if user.email else '' }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    สิทธิ์
                </label>
                <select name="role" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    <option value="moderator" {% if user.role == 'moderator' %}selected{% endif %}>ผู้ดูแลระบบ (Moderator)</option>
                    <option value="user" {% if user.role == 'user' or not user.role %}selected{% endif %}>สมาชิก (User)</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    สถานะการใช้งาน
                </label>
                <div class="flex items-center space-x-4 p-3 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" name="is_active" class="sr-only peer" {% if user.is_active %}checked{% endif %}>
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        <span class="ml-3 text-sm font-medium text-gray-700">เปิดใช้งานบัญชี</span>
                    </label>
                </div>
            </div>

            <div class="flex gap-4 pt-6 border-t">
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-lg transition font-medium shadow-sm">
                    💾 บันทึกการเปลี่ยนแปลง
                </button>
                <a href="/moderator/members"
                    class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-8 py-2.5 rounded-lg transition font-medium">
                    ยกเลิก
                </a>
            </div>

        </form>

    </div>

</div>
{% endblock %}
