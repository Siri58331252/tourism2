{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-8">✏️ แก้ไขข้อมูลสมาชิก (โหมด Admin)</h1>

    <div class="bg-white rounded-lg shadow p-8">
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อผู้ใช้</label>
                <input type="text" name="username" value="{{ user.username }}" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">อีเมล</label>
                <input type="email" name="email" value="{{ user.email if user.email else '' }}" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">สิทธิ์การใช้งาน</label>
                <select name="role" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    <option value="moderator" {% if user.role == 'moderator' %}selected{% endif %}>ผู้ดูแลระบบ (Moderator)</option>
                    <option value="member" {% if user.role == 'member' %}selected{% endif %}>สมาชิก (Member)</option>
                </select>
            </div>

            <div>
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %} 
                           class="w-5 h-5 text-blue-600 rounded">
                    <span class="text-gray-700 font-medium">เปิดใช้งานบัญชีนี้</span>
                </label>
            </div>

            <div class="flex gap-4 pt-6 border-t">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium">
                    💾 บันทึกข้อมูล
                </button>
                <a href="/users" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded-lg font-medium">
                    ยกเลิก
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
