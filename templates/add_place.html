{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-6 text-center">
        แนะนำสถานที่ท่องเที่ยว
    </h1>

    <!-- ✅ สำคัญมาก -->
    <form method="POST" enctype="multipart/form-data" class="space-y-5">

        <!-- ชื่อสถานที่ -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                ชื่อสถานที่
            </label>
            <input type="text" name="name" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="เช่น น้ำตกเอราวัณ">
        </div>

        <!-- จังหวัด -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                จังหวัด
            </label>
            <select name="province_id" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">-- เลือกจังหวัด --</option>
                {% for p in provinces %}
                <option value="{{ p.id }}">{{ p.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- หมวดหมู่ -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                หมวดหมู่
            </label>
            <select name="category_id" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">-- เลือกหมวดหมู่ --</option>
                {% for c in categories %}
                <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- รายละเอียด -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                รายละเอียด
            </label>
            <textarea name="description" rows="5" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="อธิบายรายละเอียดสถานที่ท่องเที่ยว"></textarea>
        </div>

        <!-- ✅ อัปโหลดรูป -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                รูปภาพสถานที่ (ไม่เกิน 3 รูป)
            </label>

            <input type="file" name="images" multiple accept="image/*" class="w-full px-4 py-2 border rounded-md">

            <p class="text-sm text-gray-500 mt-1">
                เลือกได้สูงสุด 3 รูป
            </p>
        </div>

        <!-- ปุ่ม -->
        <div class="flex justify-between items-center mt-6">
            <a href="/" class="text-gray-600 hover:underline">
                ← กลับหน้าแรก
            </a>

            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-semibold transition">
                บันทึกข้อมูล
            </button>
        </div>

    </form>
</div>
{% endblock %}
