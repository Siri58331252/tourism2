{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

<style>
    /* ปรับแต่งส่วนแสดงผลแผนที่ */
    #map {
        height: 380px;
        width: 100%;
        border-radius: 8px;
        z-index: 1;
        border: 1px solid #d1d5db;
    }
    .map-container {
        background-color: #f9fafb;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
    }
</style>

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">
        แนะนำสถานที่ท่องเที่ยว
    </h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-5">

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อสถานที่</label>
            <input type="text" name="name" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="เช่น น้ำตกเอราวัณ">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">จังหวัด</label>
                <select name="province_id" required
                    class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">-- เลือกจังหวัด --</option>
                    {% for p in provinces %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">หมวดหมู่</label>
                <select name="category_id" required
                    class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">-- เลือกหมวดหมู่ --</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียด</label>
            <textarea name="description" rows="4" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                placeholder="อธิบายรายละเอียดสถานที่ท่องเที่ยว"></textarea>
        </div>

        <div class="map-container space-y-3">
            <label class="block text-sm font-medium text-gray-700">ระบุตำแหน่งบนแผนที่ (ค้นหาชื่อสถานที่ได้)</label>
            
            <div id="map"></div>
            
            <p class="text-xs text-gray-500 italic">
                * พิมพ์ชื่อสถานที่ในช่องค้นหาบนแผนที่ หรือคลิกบนแผนที่เพื่อปักหมุด
            </p>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">ละติจูด (Latitude)</label>
                    <input type="text" id="latitude" name="latitude" readonly required
                        class="w-full px-3 py-2 border rounded-md bg-gray-50 text-gray-600 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">ลองจิจูด (Longitude)</label>
                    <input type="text" id="longitude" name="longitude" readonly required
                        class="w-full px-3 py-2 border rounded-md bg-gray-50 text-gray-600 text-sm outline-none">
                </div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">รูปภาพสถานที่ (ไม่เกิน 3 รูป)</label>
            <input type="file" name="images" multiple accept="image/*" 
                   class="w-full px-4 py-2 border rounded-md file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            <p class="text-xs text-gray-500 mt-1">เลือกได้สูงสุด 3 รูป</p>
        </div>

        <div class="flex justify-between items-center mt-10 pt-4 border-t border-gray-100">
            <a href="/" class="text-gray-500 hover:text-gray-800 text-sm font-medium transition">
                ← กลับหน้าแรก
            </a>
            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-2.5 rounded-md font-bold shadow-md transition transform active:scale-95">
                บันทึกข้อมูลสถานที่
            </button>
        </div>

    </form>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // ตั้งค่าพิกัดเริ่มต้น (กรุงเทพฯ)
        const startLat = 13.7563;
        const startLng = 100.5018;

        // สร้างแผนที่
        const map = L.map('map').setView([startLat, startLng], 12);

        // ดึงภาพแผนที่จาก OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let marker;

        // ฟังก์ชันอัปเดตค่าพิกัดลงใน Input
        function updateCoordInputs(lat, lng) {
            document.getElementById('latitude').value = lat.toFixed(6);
            document.getElementById('longitude').value = lng.toFixed(6);
        }

        // เพิ่มระบบค้นหา (Search Box)
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: "ค้นหาชื่อสถานที่...",
            errorMessage: "ไม่พบข้อมูลสถานที่นี้"
        })
        .on('markgeocode', function(e) {
            const latlng = e.geocode.center;
            map.setView(latlng, 16); // เลื่อนไปจุดที่ค้นหาพบ
            
            if (marker) {
                marker.setLatLng(latlng);
            } else {
                marker = L.marker(latlng, { draggable: true }).addTo(map);
                setupMarkerEvents();
            }
            updateCoordInputs(latlng.lat, latlng.lng);
        })
        .addTo(map);

        // ฟังก์ชันตั้งค่า Event ให้หมุด (เมื่อลากหมุด)
        function setupMarkerEvents() {
            marker.on('dragend', function() {
                const position = marker.getLatLng();
                updateCoordInputs(position.lat, position.lng);
            });
        }

        // คลิกที่แผนที่เพื่อปักหมุดเอง
        map.on('click', function(e) {
            const latlng = e.latlng;
            
            if (marker) {
                marker.setLatLng(latlng);
            } else {
                marker = L.marker(latlng, { draggable: true }).addTo(map);
                setupMarkerEvents();
            }
            updateCoordInputs(latlng.lat, latlng.lng);
        });
    });

    // ตรวจสอบจำนวนไฟล์ก่อน Submit ฟอร์ม
const form = document.querySelector('form');
const imageInput = document.querySelector('input[name="images"]');

form.addEventListener('submit', function(e) {
    if (imageInput.files.length > 3) {
        e.preventDefault(); // สั่งระงับการส่งฟอร์ม
        alert('ขออภัยค่ะ คุณสามารถเลือกรูปภาพได้สูงสุดเพียง 3 รูปเท่านั้น');
        imageInput.value = ""; // เคลียร์ไฟล์ที่เลือกไว้ออกทั้งหมด
    }
});

// ตรวจสอบทันทีที่เลือกไฟล์ (Optional - เพื่อประสบการณ์ผู้ใช้ที่ดี)
imageInput.addEventListener('change', function() {
    if (this.files.length > 3) {
        alert('คุณเลือกไฟล์เกิน 3 รูป ระบบจะทำการล้างรายการที่เลือกไว้');
        this.value = ""; // เคลียร์ไฟล์
    }
});
</script>

{% endblock %}
