{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-xl shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">แก้ไขข้อมูลส่วนตัว</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded {% if category == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %} text-sm">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" name="username" value="{{ current_user.username }}" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">นามสกุล</label>
            <input type="text" name="surname" value="{{ current_user.surname or '' }}" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">อีเมล</label>
            <input type="email" name="email" value="{{ current_user.email or '' }}" required
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <hr class="my-6">
        <p class="text-xs text-gray-500 italic font-semibold text-blue-600">ส่วนของการเปลี่ยนรหัสผ่าน</p>

        <div>
            <label class="block text-sm font-medium text-gray-700">รหัสผ่านใหม่ (เว้นว่างไว้ถ้าไม่เปลี่ยน)</label>
            <input type="password" name="new_password" placeholder="รหัสผ่านใหม่"
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">ยืนยันรหัสผ่านใหม่</label>
            <input type="password" name="confirm_password" placeholder="ยืนยันรหัสผ่านใหม่อีกครั้ง"
                class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div class="flex gap-3 pt-4">
            <button type="submit" 
                class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-md transition shadow-md">
                บันทึกการเปลี่ยนแปลง
            </button>
            <a href="/" class="flex-1 bg-gray-200 hover:bg-gray-300 text-center py-2 rounded-md font-bold transition text-gray-700">
                ยกเลิก
            </a>
        </div>
    </form>
</div>
{% endblock %}
